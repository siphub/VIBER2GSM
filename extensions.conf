[siphub-core]
; Outbound calls to Viber
exten => _X!,1,NoOp(Siphub: Processing outbound call to ${EXTEN})
exten => _X!,n,Answer()
exten => _X!,n,Set(ignore=${SHELL(curl -s "http://YOUR_WINDOWS_IP:5000/dial?number=${EXTEN}")})
exten => _X!,n,Wait(4) ; Give Python time to type and click
exten => _X!,n,Dial(PJSIP/200,60,rt)

; Global Hangup Handler
exten => h,1,NoOp(Siphub: Cleaning up session)
exten => h,n,Set(ignore=${SHELL(curl -s "http://YOUR_WINDOWS_IP:5000/hangup")})
